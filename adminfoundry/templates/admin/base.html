<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }}{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ ui_base }}/static/admin.css?v={{ renderer_version }}">
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:0;z-index:9999;padding:.5rem 1rem;background:#0052cc;color:#fff;text-decoration:none">Skip to main content</a>
<div class="layout">
  <nav class="sidebar" data-i18n-aria="aria_nav_label" aria-label="Admin navigation">
    <div class="app-logo app-logo--sidebar">
      <span class="app-name">{{ admin_title }}</span>
      <span class="app-admin-label">ADMIN</span>
    </div>
    <div id="nav-items" role="list" data-i18n-aria="aria_model_list" aria-label="Model list"><span class="loading" aria-live="polite" data-i18n="status_loading">Loading…</span></div>
    <div class="sidebar-footer">
      <span id="tenant-ctx" data-i18n-aria="aria_tenant" aria-label="Active tenant"></span>
      <div><span id="user-ctx" data-i18n-aria="aria_user" aria-label="Logged in as"></span></div>
      <a href="{{ ui_base }}/settings" style="display:block;margin:.3rem 0;font-size:.85rem" data-i18n="nav_settings">⚙ Settings</a>
      <button id="dark-mode-btn" class="btn btn-sm btn-secondary" onclick="AdminUI.DarkMode.toggle()" style="margin:.4rem 0;width:100%" data-i18n-aria="aria_toggle_dark_mode" data-i18n="btn_dark_mode" aria-label="Toggle dark mode">☾ Dark</button>
      <a href="{{ ui_base }}/login" id="logout-link" data-i18n="aria_logout" data-i18n-aria="aria_logout" aria-label="Log out">Log out</a>
    </div>
  </nav>
  <main id="main-content" class="main" tabindex="-1">
    <nav id="breadcrumb" class="breadcrumb" data-i18n-aria="aria_breadcrumb" aria-label="Breadcrumb"></nav>
    {% block content %}{% endblock %}
  </main>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<script>window.ADMIN_UI_BASE = '{{ ui_base }}'; window.ADMIN_LOCALE_DEFAULTS = {{ locale_defaults | tojson }};</script>
<script src="{{ ui_base }}/static/admin.i18n.js?v={{ renderer_version }}"></script>
<script src="{{ ui_base }}/static/admin.js?v={{ renderer_version }}"></script>
{% block scripts %}{% endblock %}
<script>
document.getElementById('logout-link').addEventListener('click', function(e) {
  e.preventDefault();
  AdminUI.Auth.clear();
  window.location.href = '{{ ui_base }}/login';
});
</script>
</body>
</html>
