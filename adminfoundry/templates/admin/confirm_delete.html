{% extends "base.html" %}
{% block title %} — Delete {{ model }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 id="page-title">Delete {{ model }}</h1>
  <a href="#" id="back-link" class="btn btn-secondary" aria-label="Cancel delete and go back">← Cancel</a>
</div>
<div class="card">
  <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
  <section id="detail-body" aria-label="{{ model }} record to delete" aria-live="polite">
    <p class="loading">Loading record…</p>
  </section>
  <div class="danger-zone" role="region" aria-label="Danger zone" aria-describedby="delete-warning">
    <p id="delete-warning" class="warning-text">
      <strong>Warning:</strong> This action is irreversible. The record will be permanently deleted.
    </p>
    <button id="confirm-delete-btn" class="btn btn-danger"
            aria-label="Confirm permanent deletion of this {{ model }} record"
            aria-describedby="delete-warning">
      Confirm Delete
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
AdminUI.initConfirmDelete('{{ model }}', '{{ object_id }}');
</script>
{% endblock %}
