{% extends "base.html" %}
{% block title %} — {{ model_label }} detail{% endblock %}

{% block content %}
<div class="page-header">
  <h1 id="page-title">{{ model_label }} detail</h1>
  <div style="display:flex;gap:.5rem">
    <a href="#" id="back-link" class="btn btn-secondary" aria-label="Back to {{ model_label_plural }} list">← Back</a>
    <a href="#" id="edit-link" class="btn btn-primary" aria-label="Edit this {{ model_label }}">Edit</a>
  </div>
</div>
<div class="detail-layout">
  <div class="card" style="flex:1;min-width:0">
    <section id="detail-body" aria-label="{{ model_label }} details" aria-live="polite"><p class="loading">Loading…</p></section>
  </div>
  <aside class="card detail-history-card" aria-label="Change history">
    <h3 style="font-size:.9rem;font-weight:600;color:#586069;margin-bottom:.75rem">Change History</h3>
    <div id="detail-history"><p class="loading">Loading…</p></div>
  </aside>
</div>
{% endblock %}

{% block scripts %}
<script>
AdminUI.initDetail('{{ model }}', '{{ object_id }}');
</script>
{% endblock %}
