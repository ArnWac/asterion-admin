{% extends "base.html" %}
{% block title %} — {{ model }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 id="page-title">{{ model }}</h1>
  <a href="{{ ui_base }}/{{ model }}/new" class="btn btn-primary" aria-label="Create new {{ model }}">+ New</a>
</div>
<div class="card">
  <div class="toolbar" role="search">
    <label for="search-input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Search {{ model }}</label>
    <input type="search" id="search-input" placeholder="Search…" aria-label="Search {{ model }}">
  </div>
  <div id="alert" class="alert" role="alert" aria-live="polite"></div>
  <div role="region" aria-label="{{ model }} list" aria-live="polite">
    <table aria-label="{{ model }} records">
      <thead id="table-head"></thead>
      <tbody id="table-body"><tr><td class="loading" aria-label="Loading">Loading…</td></tr></tbody>
    </table>
  </div>
  <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
</div>
{% endblock %}

{% block scripts %}
<script>
AdminUI.initList('{{ model }}');
</script>
{% endblock %}
