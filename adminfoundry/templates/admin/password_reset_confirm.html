<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adminfoundry — Set New Password</title>
  <link rel="stylesheet" href="{{ ui_base }}/static/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="app-logo">
      <span class="app-name">{{ admin_title }}</span>
      <span class="app-admin-label">ADMIN</span>
    </div>
    <h2 style="font-size:1rem;font-weight:500;margin-bottom:1.5rem;color:var(--text-muted,#6b7280)">Set new password</h2>
    <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
    <form id="confirm-form" novalidate aria-label="Set new password form">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required autofocus autocomplete="new-password" aria-required="true">
      </div>
      <div class="form-group">
        <label for="password2">Confirm new password</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password" aria-required="true">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Set password</button>
    </form>
    <p style="margin-top:1rem;text-align:center;font-size:.875rem">
      <a href="{{ ui_base }}/login">Back to login</a>
    </p>
  </div>
</div>
<script>window.ADMIN_UI_BASE = '{{ ui_base }}';</script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '{{ token }}';
  const form = document.getElementById('confirm-form');
  const alertEl = document.getElementById('alert');

  if (!token) {
    alertEl.className = 'alert alert-error';
    alertEl.textContent = 'Invalid or missing reset token.';
    alertEl.style.display = 'block';
    form.style.display = 'none';
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    alertEl.style.display = 'none';
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if (password !== password2) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Passwords do not match.';
      alertEl.style.display = 'block';
      return;
    }
    try {
      const resp = await fetch('/api/v1/auth/password-reset/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: password }),
      });
      if (!resp.ok && resp.status !== 204) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || 'Reset failed');
      }
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Password updated. Redirecting to login…';
      alertEl.style.display = 'block';
      form.style.display = 'none';
      setTimeout(() => { window.location.href = window.ADMIN_UI_BASE + '/login'; }, 2000);
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
