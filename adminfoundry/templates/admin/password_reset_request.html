<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adminfoundry — Reset Password</title>
  <link rel="stylesheet" href="{{ ui_base }}/static/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="app-logo">
      <span class="app-name">{{ admin_title }}</span>
      <span class="app-admin-label">ADMIN</span>
    </div>
    <h2 style="font-size:1rem;font-weight:500;margin-bottom:1.5rem;color:var(--text-muted,#6b7280)">Reset your password</h2>
    <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
    <form id="reset-form" novalidate aria-label="Password reset form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autofocus autocomplete="email" aria-required="true">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Send reset link</button>
    </form>
    <p style="margin-top:1rem;text-align:center;font-size:.875rem">
      <a href="{{ ui_base }}/login">Back to login</a>
    </p>
  </div>
</div>
<script>window.ADMIN_UI_BASE = '{{ ui_base }}';</script>
<script>
(function () {
  const form = document.getElementById('reset-form');
  const alertEl = document.getElementById('alert');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    alertEl.style.display = 'none';
    const email = document.getElementById('email').value;
    try {
      const resp = await fetch('/api/v1/auth/password-reset/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      if (!resp.ok && resp.status !== 204) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || 'Request failed');
      }
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'If an account exists for this email, a reset link has been sent.';
      alertEl.style.display = 'block';
      form.reset();
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
