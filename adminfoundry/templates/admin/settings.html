{% extends "base.html" %}
{% block title %} — Settings{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Personal Settings</h1>
</div>

<div class="settings-grid">
  <!-- Profile -->
  <section class="card settings-card" aria-labelledby="profile-heading">
    <h2 id="profile-heading" class="card-title">Profile</h2>
    <form id="profile-form" novalidate>
      <div class="form-group">
        <label for="pf-name">Full name</label>
        <input id="pf-name" name="full_name" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label for="pf-email">Email</label>
        <input id="pf-email" name="email" type="email" class="form-control">
      </div>
      <h3 style="margin:1.2rem 0 .6rem">Change password</h3>
      <div class="form-group">
        <label for="pf-cur-pw">Current password</label>
        <input id="pf-cur-pw" name="current_password" type="password" class="form-control" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="pf-new-pw">New password</label>
        <input id="pf-new-pw" name="new_password" type="password" class="form-control" autocomplete="new-password">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="profile-save-btn">Save profile</button>
      </div>
    </form>
  </section>

  <!-- UI Preferences -->
  <section class="card settings-card" aria-labelledby="prefs-heading">
    <h2 id="prefs-heading" class="card-title">UI Preferences</h2>
    <div class="form-group">
      <label for="pref-density">Table density</label>
      <select id="pref-density" class="form-control">
        <option value="comfortable">Comfortable</option>
        <option value="compact">Compact</option>
      </select>
    </div>

    <div class="form-group">
      <label for="pref-page-size">Default items per page</label>
      <select id="pref-page-size" class="form-control">
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>

    <div class="form-group">
      <label for="pref-theme">Color theme</label>
      <select id="pref-theme" class="form-control">
        <option value="auto">Auto (system)</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-primary" id="prefs-save-btn">Save preferences</button>
    </div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>AdminUI.initSettings();</script>
{% endblock %}
