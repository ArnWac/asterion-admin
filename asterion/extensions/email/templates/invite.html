<!doctype html>
<html>
  <body style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: #1a1a1a;">
    <p>You've been invited{% if tenant_slug %} to <strong>{{ tenant_slug }}</strong>{% endif %}.</p>
    {% if has_url %}
    <p>
      <a href="{{ link }}"
         style="display:inline-block;padding:10px 18px;background:#16a34a;color:#fff;text-decoration:none;border-radius:6px;">
        Set your password
      </a>
    </p>
    <p style="color:#666;font-size:13px;">Or paste this link into your browser:<br>{{ link }}</p>
    {% else %}
    <p>Use this invite token to set your password:</p>
    <p style="font-family:monospace;background:#f3f4f6;padding:8px 12px;border-radius:6px;">{{ link }}</p>
    {% endif %}
    <p style="color:#999;font-size:12px;">— {{ app_name }}</p>
  </body>
</html>
