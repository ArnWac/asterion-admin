<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }}</title>
  <link rel="stylesheet" href="{{ admin_ui_path }}/static/admin.css">
</head>
<body
  data-view="{{ view }}"
  {% if resource %}data-resource="{{ resource }}"{% endif %}
  {% if record_id %}data-record-id="{{ record_id }}"{% endif %}
  {% if page_id %}data-page-id="{{ page_id }}"{% endif %}
>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="layout">
    <aside class="sidebar" aria-label="Admin navigation">
      <a href="{{ admin_ui_path }}/dashboard" class="app-logo app-logo--sidebar">
        <span class="app-name">{{ admin_title }}</span>
        <span class="app-admin-label">Admin</span>
      </a>

      <div id="tenant-switcher" class="tenant-switcher" aria-label="Active tenant" hidden></div>

      <ul id="sidebar-nav" class="sidebar-nav" aria-label="Models">
        <li><span class="placeholder">Loading…</span></li>
      </ul>

      <ul
        id="sidebar-extensions"
        class="sidebar-nav sidebar-nav--extensions"
        aria-label="Extensions"
        hidden
      ></ul>

      <div class="sidebar-footer">
        <span id="user-ctx" class="user-line" aria-label="Signed in user"></span>
        <a id="settings-link" href="{{ admin_ui_path }}/settings">Settings</a>
        <button id="signout" type="button" class="btn-signout">Sign out</button>
      </div>
    </aside>

    <main id="main-content" class="main" tabindex="-1">
      <nav id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>

      <div id="app-root" data-loading="true">
        <p class="placeholder">Loading…</p>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script>
    window.ASTERION = {
      uiPath: {{ admin_ui_path | tojson }},
      authPrefix: {{ auth_api_prefix | tojson }},
      adminPrefix: {{ admin_api_prefix | tojson }},
      rootPrefix: {{ config.root_api_prefix | tojson }},
      multiTenant: {{ config.enable_multi_tenant | tojson }},
      tenantResolution: {{ config.tenant_resolution | tojson }},
      tenantHeaderName: {{ config.tenant_header_name | tojson }},
      view: {{ view | tojson }},
      resource: {{ resource | tojson }},
      recordId: {{ record_id | tojson }},
      pageId: {{ page_id | tojson }},
      pageModule: {{ page_module | tojson }},
    };
  </script>
  <script type="module" src="{{ admin_ui_path }}/static/admin.js"></script>
</body>
</html>
