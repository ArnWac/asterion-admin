<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }} — Sign in</title>
  <link rel="stylesheet" href="{{ admin_ui_path }}/static/admin.css">
</head>
<body data-view="login">
  <a href="#login-form" class="skip-link">Skip to login form</a>
  <div class="login-wrap">
    <div class="login-box">
      <div class="app-logo">
        <span class="app-name">{{ admin_title }}</span>
        <span class="app-admin-label">Admin</span>
      </div>
      <form id="login-form" novalidate autocomplete="on" aria-label="Sign in">
        <p id="login-error" class="form-error" role="alert" aria-live="polite" hidden></p>
        <label>
          Email
          <input type="email" name="email" required autofocus autocomplete="email">
        </label>
        <label>
          Password
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>

      <!-- Extension-contributed OAuth buttons render here. login.js
           fetches /api/v1/admin/_login_contract anonymously and
           populates this slot; it stays hidden when no providers are
           configured (e.g. when the auth_oauth extension isn't wired
           in). -->
      <div id="oauth-providers" class="oauth-providers" hidden></div>
    </div>
  </div>

  <script>
    window.ASTERION = {
      uiPath: {{ admin_ui_path | tojson }},
      authPrefix: {{ auth_api_prefix | tojson }},
      adminPrefix: {{ admin_api_prefix | tojson }},
      view: "login",
    };
  </script>
  <script type="module" src="{{ admin_ui_path }}/static/admin.js"></script>
</body>
</html>
