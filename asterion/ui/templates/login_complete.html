<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }} — Signing in…</title>
  <link rel="stylesheet" href="{{ admin_ui_path }}/static/admin.css">
  <!-- The OAuth callback put a JWT in the URL fragment. We don't want
       the fragment indexed or referrered: noindex blocks search engines
       and the JS below replaces the URL before any navigation happens. -->
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
</head>
<body data-view="login-complete">
  <div class="login-wrap">
    <div class="login-box">
      <div class="app-logo">
        <span class="app-name">{{ admin_title }}</span>
        <span class="app-admin-label">Admin</span>
      </div>
      <p id="login-complete-status" class="placeholder">Completing sign in…</p>
      <p id="login-complete-error" class="form-error" role="alert" aria-live="polite" hidden></p>
    </div>
  </div>

  <script>
    window.ASTERION = {
      uiPath: {{ admin_ui_path | tojson }},
      authPrefix: {{ auth_api_prefix | tojson }},
      adminPrefix: {{ admin_api_prefix | tojson }},
      view: "login-complete",
    };
  </script>
  <script type="module" src="{{ admin_ui_path }}/static/admin.js"></script>
</body>
</html>
