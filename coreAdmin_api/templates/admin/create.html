{% extends "base.html" %}
{% block title %} — New {{ model }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 id="page-title">New {{ model }}</h1>
  <a href="#" id="back-link" class="btn btn-secondary" aria-label="Cancel and go back">← Back</a>
</div>
<div class="card">
  <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
  <form id="record-form" novalidate aria-label="Create {{ model }} form">
    <div id="form-fields"><p class="loading">Loading…</p></div>
    <div style="margin-top:1rem">
      <button type="submit" class="btn btn-primary" aria-label="Create {{ model }}">Create</button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
AdminUI.initCreate('{{ model }}');
</script>
{% endblock %}
