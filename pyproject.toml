[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adminfoundry"
version = "0.1.0"
description = "FastAPI admin framework with built-in UI, JWT auth, RBAC, and multi-tenancy"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Arne Wacker", email = "arnewacker@gmail.com" }]
requires-python = ">=3.11"
keywords = ["fastapi", "admin", "crud", "multi-tenant", "sqlalchemy"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: FastAPI",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

dependencies = [
    "fastapi>=0.111.0",
    "tzdata>=2024.1",
    "uvicorn[standard]>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "pydantic[email]>=2.7.0",
    "pydantic-settings>=2.3.0",
    "python-jose[cryptography]>=3.3.0",
    "bcrypt>=4.0.0",
    "typer>=0.12.0",
    "python-multipart>=0.0.9",
    "jinja2>=3.1.0",
    "aiofiles>=23.0.0",
    "pyotp>=2.9.0",
]

[project.urls]
Homepage = "https://github.com/ArnWac/adminfoundry"
Repository = "https://github.com/ArnWac/adminfoundry"
"Bug Tracker" = "https://github.com/ArnWac/adminfoundry/issues"
Changelog = "https://github.com/ArnWac/adminfoundry/blob/main/CHANGELOG.md"

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.29.0",
]
sqlite = [
    "aiosqlite>=0.20.0",
]
redis = [
    "redis>=5.0.0",
]
s3 = [
    "boto3>=1.34.0",
]
xlsx = [
    "openpyxl>=3.1.0",
]
webhooks = [
    "httpx>=0.27.0",
]
yaml = [
    "pyyaml>=6.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "aiosqlite>=0.20.0",
]

[project.scripts]
adminfoundry = "adminfoundry.cli:app"

# Third-party apps register custom CLI commands via this entry-points group:
#   [project.entry-points."adminfoundry.commands"]
#   my_command = "myapp.cli:my_command_fn"

[tool.setuptools.packages.find]
where = ["."]
include = ["adminfoundry*"]

[tool.setuptools.package-data]
adminfoundry = ["py.typed", "templates/**/*", "static/**/*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
