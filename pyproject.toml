[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adminfoundry"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pydantic[email]>=2.7.0",
    "pydantic-settings>=2.3.0",
    "python-jose[cryptography]>=3.3.0",
    "bcrypt>=4.0.0",
    "typer>=0.12.0",
    "python-multipart>=0.0.9",
    "jinja2>=3.1.0",
    "aiofiles>=23.0.0",
]

# Optional extras — install only what you need:
#   pip install coreadmin-api[dev]          test + lint tools
#   pip install coreadmin-api[ui]           built-in admin UI (jinja2/aiofiles; already in core)
#   pip install coreadmin-api[postgres]     PostgreSQL + Alembic runtime (already in core)
[project.optional-dependencies]
ui = [
    "jinja2>=3.1.0",
    "aiofiles>=23.0.0",
]
postgres = [
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "aiosqlite>=0.20.0",
]

[project.scripts]
adminfoundry = "adminfoundry.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["adminfoundry*"]


[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
